services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: aquecedor_whatsapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "4301:3003"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/images/produtos:/app/public/images/produtos
      - ./products.json:/app/products.json

volumes:
  postgres_data:
